<svg width="1100" height="250" viewBox="0 0 1100 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">A playful workflow from idea to useful tool</title>
  <desc id="desc">Four illustrated steps showing idea, prompt, Python, and tiny useful tools.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="line" x1="122" y1="122" x2="970" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="0.35" stop-color="#0f766e"/>
      <stop offset="0.7" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .dash { stroke-dasharray: 10 12; animation: move 9s linear infinite; }
      .float { animation: float 4.5s ease-in-out infinite; }
      .float:nth-of-type(2n) { animation-delay: .8s; }
      .float:nth-of-type(3n) { animation-delay: 1.4s; }
      @keyframes move { to { stroke-dashoffset: -220; } }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
      }
    </style>
  </defs>

  <rect width="1100" height="250" rx="24" fill="#f8fafc"/>
  <path class="dash" d="M170 125 H930" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>

  <g class="float" filter="url(#shadow)">
    <rect x="42" y="55" width="230" height="140" rx="22" fill="#ffffff" stroke="#fde68a"/>
    <circle cx="157" cy="96" r="28" fill="#fef3c7"/>
    <path d="M157 61 l8 23 24 8 -24 8 -8 23 -8 -23 -24 -8 24 -8 8 -23Z" fill="#f59e0b"/>
    <text x="157" y="149" text-anchor="middle" class="sans" font-size="23" font-weight="800" fill="#111827">Idea</text>
    <text x="157" y="174" text-anchor="middle" class="mono" font-size="13" fill="#64748b">sudden curiosity</text>
  </g>

  <g class="float" filter="url(#shadow)">
    <rect x="306" y="55" width="230" height="140" rx="22" fill="#ffffff" stroke="#99f6e4"/>
    <rect x="389" y="75" width="64" height="52" rx="15" fill="#ccfbf1"/>
    <path d="M401 94 H441 M401 111 H428" stroke="#0f766e" stroke-width="6" stroke-linecap="round"/>
    <path d="M408 126 l-15 18 v-20" fill="#ccfbf1"/>
    <text x="421" y="149" text-anchor="middle" class="sans" font-size="23" font-weight="800" fill="#111827">Talk</text>
    <text x="421" y="174" text-anchor="middle" class="mono" font-size="13" fill="#64748b">shape the vibe</text>
  </g>

  <g class="float" filter="url(#shadow)">
    <rect x="570" y="55" width="230" height="140" rx="22" fill="#ffffff" stroke="#bfdbfe"/>
    <rect x="650" y="78" width="70" height="58" rx="15" fill="#dbeafe"/>
    <text x="685" y="116" text-anchor="middle" class="mono" font-size="25" font-weight="800" fill="#2563eb">.py</text>
    <text x="685" y="149" text-anchor="middle" class="sans" font-size="23" font-weight="800" fill="#111827">Build</text>
    <text x="685" y="174" text-anchor="middle" class="mono" font-size="13" fill="#64748b">run, fix, repeat</text>
  </g>

  <g class="float" filter="url(#shadow)">
    <rect x="834" y="55" width="230" height="140" rx="22" fill="#ffffff" stroke="#fbcfe8"/>
    <rect x="913" y="79" width="72" height="55" rx="15" fill="#fce7f3"/>
    <path d="M929 108 l14 14 29 -34" stroke="#db2777" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="949" y="149" text-anchor="middle" class="sans" font-size="23" font-weight="800" fill="#111827">Ship</text>
    <text x="949" y="174" text-anchor="middle" class="mono" font-size="13" fill="#64748b">tiny useful thing</text>
  </g>
</svg>
